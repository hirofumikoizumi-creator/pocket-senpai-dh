<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ポケット先輩 Web Preview</title>
  <style>
    :root{--mint:#4ecdc4;--mint-dark:#2bad9f;--mint-light:#f0fdf9;--text:#2d3748;--sub:#718096;--pink:#ff6b9d;--blue:#45b7d1;--green:#96ceb4;--yellow:#e2c34c;--purple:#9f7aea;--border:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;background:#eef8f6;color:var(--text)}button,input,textarea{font:inherit}.shell{width:min(100%,430px);min-height:100vh;margin:0 auto;background:#fafffe;padding:42px 24px 44px}.topbar{display:flex;align-items:center;justify-content:center;min-height:28px;margin-bottom:58px;font-weight:800;font-size:18px}.back{position:absolute;margin-left:-2px;border:0;background:transparent;color:var(--sub);font-weight:800;font-size:15px}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}h1{margin:0 0 4px;font-size:30px;line-height:1.12;font-weight:900;letter-spacing:0}.subtitle{color:var(--sub);font-size:13px;font-weight:700}.tooth{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:var(--mint-light);color:var(--mint);font-size:32px}.notice{display:flex;gap:8px;padding:12px 14px;margin:0 0 28px;border-left:4px solid var(--mint);border-radius:12px;background:#effdfa;color:#64748b;font-size:12px;line-height:1.7;font-weight:650}.hero{display:grid;grid-template-columns:1fr 116px;gap:10px;min-height:190px;margin-bottom:30px;padding:24px;border:0;border-radius:20px;background:#fff;box-shadow:0 10px 26px rgba(45,55,72,.08);text-align:left;cursor:pointer;width:100%;color:inherit}.hero h2{margin:0 0 10px;font-size:22px;line-height:1.3;font-weight:900}.hero p{margin:0 0 18px;color:var(--sub);font-size:14px;line-height:1.65;font-weight:650}.cta{display:inline-flex;align-items:center;gap:9px;min-width:126px;height:50px;justify-content:center;padding:0 18px;border-radius:999px;background:var(--mint);color:#fff;font-weight:900;font-size:15px}.character{position:relative;width:112px;height:150px;align-self:center}.halo{position:absolute;inset:24px 4px auto;height:104px;border-radius:52px;background:var(--mint-light)}.shadow{position:absolute;left:28px;bottom:1px;width:58px;height:9px;border-radius:999px;background:rgba(45,55,72,.12)}.hair-back{position:absolute;top:8px;left:29px;width:54px;height:58px;border-radius:27px;background:#a86f4c}.bun{position:absolute;top:2px;right:24px;width:24px;height:24px;border-radius:50%;background:#8b5e3c;border:2px solid #b98057}.face{position:absolute;top:17px;left:32px;width:48px;height:48px;border-radius:50%;background:#ffe4d4;border:2px solid #f7c7af;overflow:hidden}.bang-l,.bang-r{position:absolute;top:-5px;background:#8b5e3c}.bang-l{left:3px;width:25px;height:19px;border-radius:18px 2px 16px 2px;transform:rotate(-16deg)}.bang-r{right:4px;width:21px;height:16px;border-radius:2px 18px 2px 14px;transform:rotate(18deg);background:#a86f4c}.eyes{position:absolute;top:24px;left:13px;display:flex;gap:13px}.eye{width:4px;height:7px;border-radius:4px;background:var(--text)}.smile{position:absolute;top:33px;left:17px;width:14px;height:7px;border-bottom:2px solid #d98677;border-radius:8px}.neck{position:absolute;top:61px;left:48px;width:16px;height:14px;background:#ffd8c4}.body{position:absolute;top:71px;left:27px;width:58px;height:54px;border-radius:18px;background:#fff;border:2px solid #e3f6f2}.board{position:absolute;left:14px;top:18px;width:30px;height:32px;border-radius:8px;display:grid;place-items:center;background:#cff4ed;color:var(--mint-dark);font-size:18px}.arm{position:absolute;top:86px;width:13px;height:38px;border-radius:8px;background:#fff;border:1px solid #e3f6f2}.arm.left{left:20px;transform:rotate(16deg)}.arm.right{right:20px;transform:rotate(-16deg)}.leg{position:absolute;top:122px;width:10px;height:24px;border-radius:5px;background:#f9ffff;border:1px solid #e3f6f2}.leg.left{left:43px}.leg.right{right:43px}.section-title{margin:0 0 16px;color:var(--sub);font-size:14px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px 24px}.card{min-height:172px;border:0;border-radius:20px;padding:24px;background:#fff;box-shadow:0 10px 26px rgba(45,55,72,.08);text-align:left;cursor:pointer;color:inherit}.icon{width:58px;height:58px;display:grid;place-items:center;margin-bottom:20px;border-radius:16px;font-size:28px}.card h3{margin:0 0 8px;font-size:20px;line-height:1.3;font-weight:900}.card p{margin:0;color:var(--sub);font-size:12px;font-weight:750}.ad{height:76px;display:grid;place-items:center;margin-top:34px;border:1px dashed #cdefe9;border-radius:14px;background:var(--mint-light);color:#a0aec0;font-size:13px;font-weight:750}.list{display:grid;gap:12px}.item{border:0;border-radius:16px;background:#fff;box-shadow:0 8px 20px rgba(45,55,72,.07);padding:16px;text-align:left;color:inherit}.item-top{display:flex;gap:10px;align-items:flex-start}.item-body{flex:1}.badge{display:inline-flex;margin-bottom:8px;padding:4px 9px;border-radius:999px;background:var(--mint-light);color:var(--mint-dark);font-size:11px;font-weight:900}.item h2{margin:0 0 8px;font-size:17px;line-height:1.35}.item p{margin:0;color:var(--sub);font-size:13px;line-height:1.65}.heart{width:40px;height:40px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--sub);font-size:20px;font-weight:900}.heart.on{background:#fff5f9;border-color:#ffd1e0;color:var(--pink)}.search{width:100%;min-height:92px;margin-bottom:12px;padding:14px;border:1px solid var(--border);border-radius:16px;background:#fff;color:var(--text)}.primary{width:100%;border:0;border-radius:999px;background:var(--mint);color:#fff;padding:14px 18px;font-weight:900}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}.chip{border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--text);padding:9px 12px;font-size:12px;font-weight:800}.answer{margin-top:18px}.empty{text-align:center;color:var(--sub);line-height:1.8;padding:44px 16px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(16px);max-width:min(92vw,390px);padding:12px 16px;border-radius:999px;background:rgba(45,55,72,.96);color:#fff;font-size:13px;font-weight:750;opacity:0;transition:.2s ease;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:374px){.shell{padding-inline:18px}.hero{grid-template-columns:1fr 94px;padding:20px}.character{transform:scale(.86);transform-origin:center}.grid{gap:18px}.card{padding:20px}.card h3{font-size:18px}}
  </style>
</head>
<body>
  <main class="shell" id="app"></main>
  <div class="toast" id="toast">保存しました</div>
  <script>
    const topics=['SRP・出血時の不安','患者説明が苦手','小児対応','職場コミュニケーション','メンテナンス説明','TBIの進め方','フロス導入','歯間ブラシのサイズ相談','歯石の説明','歯周病の基礎説明','口臭相談','知覚過敏の相談','口腔乾燥','妊産婦対応','高齢者への説明','矯正中の清掃','義歯ケア','着色の説明','電動歯ブラシ相談','洗口液の使い方','食生活の聞き取り','喫煙習慣への声かけ','初診の不安対応','予約案内','クレーム初期対応','費用質問','治療方針の質問','レントゲン質問','薬剤質問','麻酔への不安','外科処置前後の質問','急な痛みの訴え','嘔吐反射が強い','開口がつらい','全身疾患の確認','服薬確認','保護者説明','学校健診後の相談','根面ケア','舌清掃','マウスピース清掃','医院ルールの確認','新人の質問方法','時間管理','不安を減らす声かけ','診療後の振り返り','患者対応の最後の確認','器具に迷う','感染対策','プラーク説明','食いしばり相談','ホワイトニング質問','インプラント周囲ケア','補綴物まわりの清掃','根管治療中の質問','抜歯後の清掃不安'];
    const makeItems=(type,prefix,body)=>topics.map((title,i)=>({id:type+'-'+String(i+1).padStart(3,'0'),type,title:prefix+title,category:title,body:body(title,i)}));
    const data={consultation:makeItems('consultation','先輩相談: ',(t)=>t+'について、観察事項を整理し、診断・治療判断は歯科医師と院内方針へ確認しましょう。'),talk:makeItems('talk','患者説明トーク: ',(t)=>'患者さんの不安を受け止め、専門用語を減らして短く説明する練習用トークです。テーマ: '+t),manual:makeItems('manual','症例別マニュアル: ',(t)=>'手順、見るポイント、注意点を学習用に整理しています。実際の判断は所属医院の手順に従います。テーマ: '+t),checklist:makeItems('checklist','チェックリスト: ',(t)=>'診療前後に確認したい学習用チェック項目です。準備、記録、共有、院内ルール確認に使えます。テーマ: '+t),quiz:makeItems('quiz','ミニ学習クイズ: ',(t,i)=>'Q. '+t+'で大切なのは？ A. 断定せず、観察事項と確認が必要な内容を分けることです。 問題 '+(i+1)+' / 56')};
    const labels={consultation:'先輩相談AIチャット',talk:'患者説明トーク集',manual:'症例別マニュアル',checklist:'チェックリスト',quiz:'ミニ学習クイズ',favorites:'お気に入り'};const app=document.getElementById('app');const toast=document.getElementById('toast');let page='home';let answer=null;const getFavs=()=>JSON.parse(localStorage.getItem('pocketSenpaiFavorites')||'[]');const setFavs=(f)=>localStorage.setItem('pocketSenpaiFavorites',JSON.stringify(f));const key=(item)=>item.type+'::'+item.id;const isFav=(item)=>getFavs().some(f=>key(f)===key(item));function toggleFav(item,event){if(event)event.stopPropagation();let favs=getFavs();if(isFav(item)){favs=favs.filter(f=>key(f)!==key(item));toast.textContent='お気に入りから削除しました'}else{favs=[{...item,savedAt:new Date().toISOString()},...favs];toast.textContent='お気に入りに保存しました'}setFavs(favs);showToast();render()}function showToast(){toast.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>toast.classList.remove('show'),1500)}function chrome(title){return '<div class="topbar">'+(page==='home'?'':'<button class="back" onclick="go(\'home\')">← 戻る</button>')+'<span>'+title+'</span></div>'}function disclaimer(){return '<div class="notice"><span>ⓘ</span><span>本アプリは教育・学習支援を目的とした参考情報を提供するものであり、診断・治療を行うものではありません。実際の診療判断は歯科医師・所属医院の方針に従ってください。</span></div>'}function charHtml(){return '<div class="character" aria-hidden="true"><div class="halo"></div><div class="shadow"></div><div class="hair-back"></div><div class="bun"></div><div class="face"><div class="bang-l"></div><div class="bang-r"></div><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="smile"></div></div><div class="neck"></div><div class="body"><div class="board">✓</div></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div></div>'}function renderHome(){app.innerHTML=chrome('index')+'<div class="header"><div><h1>ポケット先輩</h1><div class="subtitle">歯科衛生士のための学習サポート</div></div><div class="tooth">♡</div></div>'+disclaimer()+'<button class="hero" onclick="go(\'consultation\')"><div><h2>先輩相談AIチャット</h2><p>仕事の不安、説明の迷い、成長の悩みを先輩に相談</p><span class="cta">相談する →</span></div>'+charHtml()+'</button><p class="section-title">学習メニュー</p><section class="grid">'+card('talk','▤','患者説明トーク集','説明の参考に','var(--pink)')+card('manual','▥','症例別マニュアル','手順を確認','var(--blue)')+card('checklist','☑','チェックリスト','準備を確認','var(--green)')+card('quiz','◇','ミニ学習クイズ','知識をチェック','var(--yellow)')+card('favorites','♡','お気に入り','保存した内容','var(--purple)')+'</section><div class="ad">Ad Banner (banner)</div>'}function card(type,icon,title,sub,color){return '<button class="card" onclick="go(\''+type+'\')"><div class="icon" style="background:rgba(78,205,196,.10);color:'+color+'">'+icon+'</div><h3>'+title+'</h3><p>'+sub+'</p></button>'}function renderList(type,items){app.innerHTML=chrome(labels[type])+(type==='favorites'?'':disclaimer())+'<p class="section-title">'+items.length+'件</p><section class="list">'+(items.length?items.map(itemHtml).join(''):'<div class="empty">お気に入りはまだありません。<br>各画面のハートを押すとここに保存されます。</div>')+'</section>'}function itemHtml(item){const on=isFav(item)?' on':'';return '<article class="item"><div class="item-top"><div class="item-body"><span class="badge">'+(labels[item.type]||item.category)+'</span><h2>'+item.title+'</h2><p>'+item.body+'</p></div><button class="heart'+on+'" onclick="toggleFav('+JSON.stringify(item).replaceAll('"','&quot;')+',event)">♡</button></div></article>'}function renderConsultation(){const suggestions=topics.slice(0,8).map(t=>'<button class="chip" onclick="ask(\''+t+'\')">'+t+'</button>').join('');app.innerHTML=chrome(labels.consultation)+disclaimer()+'<textarea class="search" id="query" placeholder="悩みや質問を入力してね...">'+(answer?answer.category:'')+'</textarea><button class="primary" onclick="ask(document.getElementById(\'query\').value)">先輩に相談する</button><div class="chips">'+suggestions+'</div><div class="answer">'+(answer?itemHtml(answer):'<div class="empty">相談を入力すると、学習用の先輩回答が表示されます。</div>')+'</div>'}function ask(q){const hit=topics.find(t=>q&&q.includes(t))||topics.find(t=>q&&t.includes(q))||topics[0];answer=data.consultation.find(i=>i.category===hit);renderConsultation()}function go(next){page=next;answer=null;render()}function render(){if(page==='home')return renderHome();if(page==='consultation')return renderConsultation();if(page==='favorites')return renderList('favorites',getFavs());return renderList(page,data[page]||[])}render();
  </script>
</body>
</html>
