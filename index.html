<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ポケット先輩 Web Preview</title>
  <style>
    :root {
      --mint: #4ecdc4;
      --mint-dark: #2bad9f;
      --mint-light: #f0fdf9;
      --text: #2d3748;
      --sub: #718096;
      --pink: #ff6b9d;
      --blue: #45b7d1;
      --green: #96ceb4;
      --yellow: #ffeaa7;
      --purple: #dda0dd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #eef8f6;
      color: var(--text);
    }
    .shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      background: #fafffe;
      padding: 42px 24px 44px;
    }
    .topbar {
      text-align: center;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 78px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 30px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 0;
    }
    .subtitle {
      color: var(--sub);
      font-size: 13px;
      font-weight: 700;
    }
    .tooth {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--mint-light);
      color: var(--mint);
      font-size: 32px;
      flex: 0 0 auto;
    }
    .notice {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      margin: 0 0 28px;
      border-left: 4px solid var(--mint);
      border-radius: 12px;
      background: #effdfa;
      color: #64748b;
      font-size: 12px;
      line-height: 1.7;
      font-weight: 650;
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr 116px;
      gap: 10px;
      min-height: 190px;
      margin-bottom: 30px;
      padding: 24px;
      border: 0;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 10px 26px rgba(45, 55, 72, .08);
      text-align: left;
      cursor: pointer;
      width: 100%;
      color: inherit;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 14px;
      padding: 6px 11px;
      border-radius: 999px;
      background: var(--mint-light);
      color: var(--mint-dark);
      font-size: 12px;
      font-weight: 900;
    }
    .hero h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 900;
      letter-spacing: 0;
    }
    .hero p {
      margin: 0 0 18px;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.65;
      font-weight: 650;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 126px;
      height: 50px;
      justify-content: center;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--mint);
      color: #fff;
      font-weight: 900;
      font-size: 15px;
    }
    .character {
      position: relative;
      width: 112px;
      height: 150px;
      align-self: center;
    }
    .halo {
      position: absolute;
      inset: 24px 4px auto;
      height: 104px;
      border-radius: 52px;
      background: var(--mint-light);
    }
    .shadow {
      position: absolute;
      left: 28px;
      bottom: 1px;
      width: 58px;
      height: 9px;
      border-radius: 999px;
      background: rgba(45, 55, 72, .12);
    }
    .hair-back {
      position: absolute;
      top: 8px;
      left: 29px;
      width: 54px;
      height: 58px;
      border-radius: 27px;
      background: #a86f4c;
    }
    .bun {
      position: absolute;
      top: 2px;
      right: 24px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #8b5e3c;
      border: 2px solid #b98057;
    }
    .face {
      position: absolute;
      top: 17px;
      left: 32px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #ffe4d4;
      border: 2px solid #f7c7af;
      overflow: hidden;
    }
    .bang-l, .bang-r { position: absolute; top: -5px; background: #8b5e3c; }
    .bang-l { left: 3px; width: 25px; height: 19px; border-radius: 18px 2px 16px 2px; transform: rotate(-16deg); }
    .bang-r { right: 4px; width: 21px; height: 16px; border-radius: 2px 18px 2px 14px; transform: rotate(18deg); background: #a86f4c; }
    .eyes { position: absolute; top: 24px; left: 13px; display: flex; gap: 13px; }
    .eye { width: 4px; height: 7px; border-radius: 4px; background: var(--text); }
    .smile { position: absolute; top: 33px; left: 17px; width: 14px; height: 7px; border-bottom: 2px solid #d98677; border-radius: 8px; }
    .neck { position: absolute; top: 61px; left: 48px; width: 16px; height: 14px; background: #ffd8c4; }
    .body {
      position: absolute;
      top: 71px;
      left: 27px;
      width: 58px;
      height: 54px;
      border-radius: 18px;
      background: #fff;
      border: 2px solid #e3f6f2;
    }
    .board {
      position: absolute;
      left: 14px;
      top: 18px;
      width: 30px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #cff4ed;
      color: var(--mint-dark);
      font-size: 18px;
    }
    .arm { position: absolute; top: 86px; width: 13px; height: 38px; border-radius: 8px; background: #fff; border: 1px solid #e3f6f2; }
    .arm.left { left: 20px; transform: rotate(16deg); }
    .arm.right { right: 20px; transform: rotate(-16deg); }
    .leg { position: absolute; top: 122px; width: 10px; height: 24px; border-radius: 5px; background: #f9ffff; border: 1px solid #e3f6f2; }
    .leg.left { left: 43px; }
    .leg.right { right: 43px; }
    .section-title {
      margin: 0 0 16px;
      color: var(--sub);
      font-size: 14px;
      font-weight: 800;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px 24px;
    }
    .card {
      min-height: 172px;
      border: 0;
      border-radius: 20px;
      padding: 24px;
      background: #fff;
      box-shadow: 0 10px 26px rgba(45, 55, 72, .08);
      text-align: left;
      cursor: pointer;
      color: inherit;
    }
    .icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      margin-bottom: 20px;
      border-radius: 16px;
      font-size: 29px;
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 900;
      letter-spacing: 0;
    }
    .card p {
      margin: 0;
      color: var(--sub);
      font-size: 12px;
      font-weight: 750;
    }
    .ad {
      height: 76px;
      display: grid;
      place-items: center;
      margin-top: 34px;
      border: 1px dashed #cdefe9;
      border-radius: 14px;
      background: var(--mint-light);
      color: #a0aec0;
      font-size: 13px;
      font-weight: 750;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(16px);
      max-width: min(92vw, 390px);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(45, 55, 72, .96);
      color: #fff;
      font-size: 13px;
      font-weight: 750;
      opacity: 0;
      transition: .2s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 374px) {
      .shell { padding-inline: 18px; }
      .hero { grid-template-columns: 1fr 94px; padding: 20px; }
      .character { transform: scale(.86); transform-origin: center; }
      .grid { gap: 18px; }
      .card { padding: 20px; }
      .card h3 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">index</div>
    <header>
      <div>
        <h1>ポケット先輩</h1>
        <div class="subtitle">歯科衛生士のための学習サポート</div>
      </div>
      <div class="tooth">♡</div>
    </header>

    <div class="notice"><span>ⓘ</span><span>本アプリは教育・学習支援を目的とした参考情報を提供するものであり、診断・治療を行うものではありません。実際の診療判断は歯科医師・所属医院の方針に従ってください。</span></div>

    <button class="hero" type="button" data-title="先輩相談AIチャット">
      <div>
        <div class="badge">☆ 目玉機能</div>
        <h2>先輩相談AIチャット</h2>
        <p>仕事の不安、説明の迷い、成長の悩みを先輩に相談</p>
        <span class="cta">相談する →</span>
      </div>
      <div class="character" aria-hidden="true">
        <div class="halo"></div><div class="shadow"></div><div class="hair-back"></div><div class="bun"></div>
        <div class="face"><div class="bang-l"></div><div class="bang-r"></div><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="smile"></div></div>
        <div class="neck"></div><div class="body"><div class="board">✓</div></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div>
      </div>
    </button>

    <p class="section-title">学習メニュー</p>
    <section class="grid">
      <button class="card" type="button" data-title="患者説明トーク集"><div class="icon" style="background:#ff6b9d18;color:var(--pink);">▤</div><h3>患者説明トーク集</h3><p>説明の参考に</p></button>
      <button class="card" type="button" data-title="症例別マニュアル"><div class="icon" style="background:#45b7d118;color:var(--blue);">▥</div><h3>症例別マニュアル</h3><p>手順を確認</p></button>
      <button class="card" type="button" data-title="チェックリスト"><div class="icon" style="background:#96ceb418;color:var(--green);">☑</div><h3>チェックリスト</h3><p>準備を確認</p></button>
      <button class="card" type="button" data-title="ミニ学習クイズ"><div class="icon" style="background:#ffeaa718;color:#e2c34c;">♢</div><h3>ミニ学習クイズ</h3><p>知識をチェック</p></button>
      <button class="card" type="button" data-title="お気に入り"><div class="icon" style="background:#dda0dd18;color:var(--purple);">♡</div><h3>お気に入り</h3><p>保存した内容</p></button>
    </section>
    <div class="ad">Ad Banner (banner)</div>
  </main>
  <div class="toast" id="toast">プレビューです</div>
  <script>
    const toast = document.getElementById('toast');
    let timer;
    document.querySelectorAll('button[data-title]').forEach((button) => {
      button.addEventListener('click', () => {
        toast.textContent = button.dataset.title + ' を開きます（Webプレビュー）';
        toast.classList.add('show');
        clearTimeout(timer);
        timer = setTimeout(() => toast.classList.remove('show'), 1600);
      });
    });
  </script>
</body>
</html>
